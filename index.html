  <div class="header-nav">
    <div class="logo">🍳</div>

    </a>
  </div>

  <h1>PantrySpin</h1>
  <p class="tagline">Spin your pantry ingredients into delicious meals!</p>

  <div class="input-group">
    <input
      type="text"
      id="ingredientInput"
      placeholder="Enter ingredients (e.g., garlic, olive oil, pasta)"
    />
    <button onclick="getRecipe()">✨ Get Recipe</button>
  </div>

  <div id="recipe"></div>

  <a href="affiliate-demo.html" class="demo-link">View Amazon Affiliate Demo Page</a>

  <footer class="disclosure">
    <p>As an Amazon Associate, I earn from qualifying purchases. This helps support PantrySpin at no extra cost to you!</p>
  </footer>

  <script>
    const ASSOCIATE_TAG = 'mbm03-21';
    const recipes = [
      {
        name: "Pasta Aglio e Olio",
        servings: 4,
        ingredients: ["spaghetti", "garlic", "olive oil", "red pepper flakes", "parsley"],
        instructions: [
          "Boil pasta in salted water until al dente.",
          "Sauté thinly sliced garlic and red pepper flakes in olive oil over low heat until fragrant.",
          "Toss pasta with the garlic oil and a splash of pasta water.",
          "Garnish with fresh parsley."
        ]
      }
    ];

    function getRecipe() {
      const input = document.getElementById('ingredientInput').value.toLowerCase();
      if (!input.trim()) { alert('Please enter some ingredients!'); return; }
      displayRecipe(recipes[0]);
    }

    function displayRecipe(recipe) {
      const recipeDiv = document.getElementById('recipe');
      recipeDiv.innerHTML = `
        <h2>${recipe.name}</h2>
        <p><strong>Servings:</strong> ${recipe.servings}</p>
        <h3>Ingredients:</h3>
        <ul>
          ${recipe.ingredients.map(ing => {
            const amazonUrl = "https://www.amazon.co.uk/s?k=" + encodeURIComponent(ing) + "&tag=" + ASSOCIATE_TAG;
            return "<li><a href=\"" + amazonUrl + "\" class=\"ingredient-link\" target=\"_blank\">" + ing + "</a></li>";
          }).join('')}
        </ul>
        <h3>Instructions:</h3>
        <ol>
          ${recipe.instructions.map(step => "<li>" + step + "</li>").join('')}
        </ol>
      `;
    }
  </script>
