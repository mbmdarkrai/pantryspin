<body>
  <h1>🍳 Recipe Randomizer</h1>

  <!-- Amazon affiliate links (real products with Associate ID) -->
  <div class="affiliate-box">
    🛒
    <a href="https://www.amazon.co.uk/Tesco-Finest-Chicken-Breast-Pack/dp/B08D7XQVNL/?tag=pantryspincoun-21" target="_blank" rel="nofollow noopener noreferrer">Chicken</a> •
    <a href="https://www.amazon.co.uk/Tilda-Steamed-Basmati-Rice-250g/dp/B00CDLVG2C/?tag=pantryspincoun-21" target="_blank" rel="nofollow noopener noreferrer">Rice</a> •
    <a href="https://www.amazon.co.uk/Kikkoman-Soy-Sauce-150ml-Pack/dp/B000V5S6OW/?tag=pantryspincoun-21" target="_blank" rel="nofollow noopener noreferrer">Soy Sauce</a>
    <small class="affiliate-note">(Amazon affiliate)</small>
  </div>

  <p>Enter ingredients you have (comma-separated), hit randomize and get meal ideas.</p>

  <div class="input-group">
    <input
      id="ingredients"
      type="text"
      placeholder="e.g. chicken, rice, broccoli, garlic, soy sauce"
    />
    <button type="button" onclick="randomize()">Generate Recipe 🎲</button>
  </div>

  <!-- servings + shopping list controls will appear inside this -->
  <div id="output"></div>

  <!-- shopping list area -->
  <div id="shoppingListContainer" class="shopping-list" style="display:none;">
    <h3>📝 Shopping list</h3>
    <ul id="shoppingList"></ul>
  </div>

  <script>
    // base recipes with structured ingredients for scaling
    const recipes = [
      {
        name: "Chicken Fried Rice",
        servings: 1,
        ingredients: [
          { name: "chicken", amount: 150, unit: "g" },
          { name: "rice", amount: 80, unit: "g" },
          { name: "egg", amount: 1, unit: "" },
          { name: "soy sauce", amount: 1, unit: "tbsp" },
          { name: "garlic", amount: 1, unit: "clove" }
        ],
        instructions: "Cook rice. Stir-fry chicken and garlic, add egg and veggies, mix in rice and soy. 20 min.",
        time: 20,
        calories: 550
      },
      {
        name: "Veggie Pasta",
        servings: 1,
        ingredients: [
          { name: "pasta", amount: 80, unit: "g" },
          { name: "tomato", amount: 1, unit: "" },
          { name: "garlic", amount: 1, unit: "clove" },
          { name: "onion", amount: 0.5, unit: "" },
          { name: "basil", amount: 1, unit: "tbsp" }
        ],
        instructions: "Boil pasta. Saute veggies, add tomato sauce. Toss together. 15 min.",
        time: 15,
        calories: 400
      },
      {
        name: "Quinoa Salad",
        servings: 1,
        ingredients: [
          { name: "quinoa", amount: 60, unit: "g" },
          { name: "cucumber", amount: 0.5, unit: "" },
          { name: "tomato", amount: 1, unit: "" },
          { name: "feta", amount: 30, unit: "g" },
          { name: "olive oil", amount: 1, unit: "tbsp" }
        ],
        instructions: "Cook quinoa. Chop veggies, mix with oil and feta. Chill. 25 min.",
        time: 25,
        calories: 380
      },
      {
        name: "Chickpea Curry",
        servings: 1,
        ingredients: [
          { name: "chickpeas", amount: 120, unit: "g" },
          { name: "spinach", amount: 50, unit: "g" },
          { name: "coconut milk", amount: 100, unit: "ml" },
          { name: "curry powder", amount: 1, unit: "tbsp" }
        ],
        instructions: "Simmer chickpeas in coconut milk and curry. Add spinach. Serve with rice. 30 min.",
        time: 30,
        calories: 450
      },
      {
        name: "Tofu Stir Fry",
        servings: 1,
        ingredients: [
          { name: "tofu", amount: 100, unit: "g" },
          { name: "broccoli", amount: 80, unit: "g" },
          { name: "soy sauce", amount: 1, unit: "tbsp" },
          { name: "ginger", amount: 1, unit: "tsp" }
        ],
        instructions: "Stir-fry tofu and broccoli, add soy and ginger. 15 min.",
        time: 15,
        calories: 320
      },
      {
        name: "Lentil Soup",
        servings: 1,
        ingredients: [
          { name: "lentils", amount: 70, unit: "g" },
          { name: "carrot", amount: 1, unit: "" },
          { name: "onion", amount: 0.5, unit: "" },
          { name: "cumin", amount: 1, unit: "tsp" }
        ],
        instructions: "Saute onion/carrot, add lentils and spices, simmer 30 min.",
        time: 35,
        calories: 300
      }
    ];

    let baseRecipe = null;       // structured base for scaling
    let currentRecipe = null;    // scaled version

    function formatAmount(a) {
      // nicer display for halves etc.
      return Math.round(a * 10) / 10;
    }

    function randomize() {
      const input = document.getElementById("ingredients").value.toLowerCase();
      const userIngs = input
        .split(",")
        .map(s => s.trim())
        .filter(Boolean);

      if (userIngs.length < 1) {
        alert("Add some ingredients!");
        return;
      }

      const matches = recipes.filter(r =>
        r.ingredients.some(ing => userIngs.includes(ing.name.toLowerCase()))
      );

      const output = document.getElementById("output");

      if (matches.length === 0) {
        output.innerHTML =
          '<p>No matches. Try broader ingredients like "rice" or "chicken".</p>';
        document.getElementById("shoppingListContainer").style.display = "none";
        return;
      }

      const recipe = matches[Math.floor(Math.random() * matches.length)];
      baseRecipe = JSON.parse(JSON.stringify(recipe));
      currentRecipe = JSON.parse(JSON.stringify(recipe));

      renderRecipe(userIngs);
      renderShoppingList();
    }

    function renderRecipe(userIngs) {
      const output = document.getElementById("output");
      const missing = currentRecipe.ingredients.filter(
        ing => !userIngs.includes(ing.name.toLowerCase())
      );
      const have = currentRecipe.ingredients.filter(
        ing => userIngs.includes(ing.name.toLowerCase())
      );

      const haveList = have
        .map(
          ing =>
            `<li>✅ ${formatAmount(ing.amount)} ${ing.unit} ${ing.name}</li>`
        )
        .join("");

      const missingList = missing
        .map(
          ing =>
            `<li class="missing">❌ ${formatAmount(ing.amount)} ${ing.unit} ${ing.name}</li>`
        )
        .join("");

      const affiliateBlockBelow = `
        <div class="affiliate-box">
          🛒 Missing something? Shop pantry staples on Amazon:
          <a href="https://www.amazon.co.uk/Tesco-Finest-Chicken-Breast-Pack/dp/B08D7XQVNL/?tag=pantryspincoun-21"
             target="_blank" rel="nofollow noopener noreferrer">Chicken</a> •
          <a href="https://www.amazon.co.uk/Tilda-Steamed-Basmati-Rice-250g/dp/B00CDLVG2C/?tag=pantryspincoun-21"
             target="_blank" rel="nofollow noopener noreferrer">Rice</a> •
          <a href="https://www.amazon.co.uk/Kikkoman-Soy-Sauce-150ml-Pack/dp/B000V5S6OW/?tag=pantryspincoun-21"
             target="_blank" rel="nofollow noopener noreferrer">Soy Sauce</a>
          <small class="affiliate-note">(Amazon affiliate – I may earn a commission)</small>
        </div>
      `;

      output.innerHTML = `
        <div class="recipe">
          <h2>${currentRecipe.name} (${currentRecipe.time} min, ~${currentRecipe.calories} cal)</h2>

          <div class="servings-control">
            <span><strong>Servings:</strong></span>
            <select id="servingsSelect">
              <option value="1"${currentRecipe.servings === 1 ? " selected" : ""}>1</option>
              <option value="2"${currentRecipe.servings === 2 ? " selected" : ""}>2</option>
              <option value="4"${currentRecipe.servings === 4 ? " selected" : ""}>4</option>
            </select>
            <button type="button" id="shoppingListBtn">View shopping list 📝</button>
          </div>

          <h3>You have:</h3>
          <ul class="ingredients">
            ${haveList || "<li>None of the core ingredients yet.</li>"}
          </ul>

          ${
            missing.length
              ? `<h3>Need to buy:</h3>
                 <ul class="ingredients">
                   ${missingList}
                 </ul>`
              : "<p>✅ All ingredients ready!</p>"
          }

          <h3>Instructions:</h3>
          <p>${currentRecipe.instructions}</p>

          ${affiliateBlockBelow}

          <button type="button" onclick="randomize()">New Recipe 🎲</button>
        </div>
      `;

      // attach listeners after we set innerHTML
      const servingsSelect = document.getElementById("servingsSelect");
      servingsSelect.addEventListener("change", () => {
        const target = parseInt(servingsSelect.value, 10);
        scaleRecipe(target);
        // re-render have/missing with same user ingredients
        const input = document.getElementById("ingredients").value.toLowerCase();
        const userIngs = input
          .split(",")
          .map(s => s.trim())
          .filter(Boolean);
        renderRecipe(userIngs);
        renderShoppingList();
      });

      document
        .getElementById("shoppingListBtn")
        .addEventListener("click", () => {
          renderShoppingList();
          document.getElementById("shoppingListContainer").style.display =
            "block";
        });
    }

    function scaleRecipe(targetServings) {
      if (!baseRecipe) return;
      const factor = targetServings / baseRecipe.servings;
      currentRecipe.servings = targetServings;
      currentRecipe.ingredients = baseRecipe.ingredients.map(ing => ({
        ...ing,
        amount: formatAmount(ing.amount * factor)
      }));
    }

    function renderShoppingList() {
      if (!currentRecipe) return;
      const shoppingListEl = document.getElementById("shoppingList");
      shoppingListEl.innerHTML = "";

      currentRecipe.ingredients.forEach(ing => {
        const li = document.createElement("li");
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";

        const label = document.createElement("label");
        label.textContent = ` ${formatAmount(ing.amount)} ${ing.unit} ${ing.name}`;

        li.appendChild(checkbox);
        li.appendChild(label);
        shoppingListEl.appendChild(li);
      });
    }
  </script>
